name: Build and Publish Docker Images

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository_owner }}/repogod

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # SPRING BACKEND
      - name: Extract metadata for Spring Backend
        id: meta-spring
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-spring
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Spring Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-spring
          push: true
          tags: ${{ steps.meta-spring.outputs.tags }}
          labels: ${{ steps.meta-spring.outputs.labels }}

      # FASTAPI BACKEND
      - name: Extract metadata for FastAPI Backend
        id: meta-fastapi
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-fastapi
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push FastAPI Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-fastapi
          push: true
          tags: ${{ steps.meta-fastapi.outputs.tags }}
          labels: ${{ steps.meta-fastapi.outputs.labels }}

      # FRONTEND
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-frontend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

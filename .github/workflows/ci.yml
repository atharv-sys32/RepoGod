name: Build and Push Docker Images

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/repogod

jobs:
  backend-spring:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: tj-actions/changed-files@v44
        id: changed-spring
        with:
          files: backend-spring/**
      - name: Build and push
        if: steps.changed-spring.outputs.any_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend-spring
          file: ./backend-spring/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-spring:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-spring:${{ github.sha }}

  backend-fastapi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: tj-actions/changed-files@v44
        id: changed-fastapi
        with:
          files: backend-fastapi/**
      - name: Build and push
        if: steps.changed-fastapi.outputs.any_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend-fastapi
          file: ./backend-fastapi/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-fastapi:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-fastapi:${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: tj-actions/changed-files@v44
        id: changed-frontend
        with:
          files: frontend/**
      - name: Build and push
        if: steps.changed-frontend.outputs.any_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: [backend-spring, backend-fastapi, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/repogod
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

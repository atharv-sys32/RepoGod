name: Build and Push Docker Images

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  # The registry to push to – GitHub Container Registry in this case
  REGISTRY: ghcr.io
  # Full name of the repository – used as the image namespace
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Build each service separately so we can tag them individually
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend-spring
        uses: docker/build-push-action@v5
        with:
          context: ./backend-spring
          file: ./backend-spring/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-spring:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-spring:${{ github.sha }}

      - name: Build and push backend-fastapi
        uses: docker/build-push-action@v5
        with:
          context: ./backend-fastapi
          file: ./backend-fastapi/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-fastapi:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-fastapi:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
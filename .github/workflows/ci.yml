name: RepoGod CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-spring:
    name: Spring Boot Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: repogod_test
          POSTGRES_USER: repogod
          POSTGRES_PASSWORD: repogod_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build & Test
        working-directory: backend-spring
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew build --no-daemon || gradle build --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/repogod_test
          SPRING_DATASOURCE_USERNAME: repogod
          SPRING_DATASOURCE_PASSWORD: repogod_secret

  backend-fastapi:
    name: FastAPI Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Dependencies
        working-directory: backend-fastapi
        run: |
          pip install -r requirements.txt
          pip install pytest httpx ruff
      - name: Lint
        working-directory: backend-fastapi
        run: ruff check app/ --select E,F,W --ignore E501
      - name: Test
        working-directory: backend-fastapi
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///test.db
          REDIS_URL: redis://localhost:6379
          GOOGLE_API_KEY: test-key

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type Check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend-spring, backend-fastapi, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Images
        run: docker compose build
